openapi: 3.1.0
info:
  title: leCRM API
  version: 0.1.0
  summary: Workspace-scoped CRM REST API + service-token administration
  description: |
    leCRM v0 HTTP API — Sprint 7 surface.

    Workspace identity is resolved from the request subdomain (e.g.
    `https://acme.lecrm.fr/v1/contacts`). All endpoints under `/v1` are
    workspace-scoped; the workspace tenant schema is derived from the
    `workspaces.role_name` column (per ADR-009 §2.1).

    Two authentication modes are supported:
      * Session cookie (browser) — set by the OIDC callback under
        `/auth/callback`. Cookie name `lecrm_session_<workspace>`.
      * Bearer token (programmatic / MCP / chatboting connector) —
        sent as `Authorization: Bearer lecrm_<workspace>_<random>`.
        Tokens are minted via `POST /v1/workspace/tokens` and stored
        as argon2id hashes (ADR-009 §4.1).

    Idempotency: every `POST` accepts an optional `Idempotency-Key`
    header. Replays within 24h return the cached response with the
    `Idempotency-Replayed: true` response header.

    Pagination: list endpoints return a `next_cursor` (opaque base64
    URL-safe value) and a `has_more` boolean. Pass the `next_cursor`
    back to the same endpoint via the `cursor` query parameter to fetch
    the next page.

servers:
  - url: https://{workspace}.lecrm.fr
    description: Production
    variables:
      workspace:
        default: acme
        description: Workspace subdomain slug
  - url: http://{workspace}.lecrm.test:8080
    description: Local development
    variables:
      workspace:
        default: acme

tags:
  - name: contacts
  - name: companies
  - name: deals
  - name: pipeline
  - name: activities
  - name: notes
  - name: tasks
  - name: workspace
  - name: tokens

paths:

  # ---------- Contacts ----------
  /v1/contacts:
    get:
      tags: [contacts]
      summary: List contacts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/ContactList'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [contacts]
      summary: Create contact
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contact' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/contacts/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [contacts]
      summary: Get contact by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contact' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [contacts]
      summary: Update contact
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contact' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [contacts]
      summary: Delete contact
      responses:
        '204': { description: No Content }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------- Companies ----------
  /v1/companies:
    get:
      tags: [companies]
      summary: List companies
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/CompanyList'
    post:
      tags: [companies]
      summary: Create company
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }

  /v1/companies/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [companies]
      summary: Get company
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [companies]
      summary: Update company
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
    delete:
      tags: [companies]
      summary: Delete company
      responses:
        '204': { description: No Content }

  # ---------- Deals ----------
  /v1/deals:
    get:
      tags: [deals]
      summary: List deals
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/DealList'
    post:
      tags: [deals]
      summary: Create deal
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DealCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }

  /v1/deals/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [deals]
      summary: Get deal
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [deals]
      summary: Update deal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DealUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
    delete:
      tags: [deals]
      summary: Delete deal
      responses:
        '204': { description: No Content }

  /v1/deals/{id}/stage:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [deals, pipeline]
      summary: Transition deal to a new pipeline stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage_id]
              properties:
                stage_id: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deal' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  # ---------- CSV export (Sprint 9, feature 8) ----------
  /v1/contacts/export:
    get:
      tags: [contacts, export]
      summary: Export all contacts as CSV (workspace-scoped, custom properties flattened)
      parameters:
        - $ref: '#/components/parameters/ExportFormat'
      responses:
        '200':
          $ref: '#/components/responses/CsvExport'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/companies/export:
    get:
      tags: [companies, export]
      summary: Export all companies as CSV (workspace-scoped)
      parameters:
        - $ref: '#/components/parameters/ExportFormat'
      responses:
        '200':
          $ref: '#/components/responses/CsvExport'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/deals/export:
    get:
      tags: [deals, export]
      summary: Export all deals as CSV (workspace-scoped, custom properties flattened)
      parameters:
        - $ref: '#/components/parameters/ExportFormat'
      responses:
        '200':
          $ref: '#/components/responses/CsvExport'
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---------- CSV import (integrator-gap tasket 20260601-110828-736b) ----------
  # One parameterised route group serves all three entities — the handler
  # resolves {entity} via chi.URLParam (handlers.go RegisterRoutes). The
  # {entity} segment MUST be templated here, not split into static literals,
  # or the contract test (and the live handler) diverge.
  /v1/import/{entity}/analyze:
    parameters:
      - $ref: '#/components/parameters/ImportEntity'
    post:
      tags: [import]
      summary: Parse CSV header + sample rows and return suggested column mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportAnalyzeReq'
      responses:
        '200':
          description: Analyze result with columns, sample rows, and suggested mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportAnalyzeResp'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/import/{entity}/preview:
    parameters:
      - $ref: '#/components/parameters/ImportEntity'
    post:
      tags: [import]
      summary: Dry-run — classify every row without writing anything
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportMappingReq'
      responses:
        '200':
          description: Per-row classification (create/update/skip/error) and summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResp'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/import/{entity}/commit:
    parameters:
      - $ref: '#/components/parameters/ImportEntity'
    post:
      tags: [import]
      summary: Commit the import — write records, merge custom props, emit audit event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportMappingReq'
      responses:
        '200':
          description: Import summary and downloadable error-report CSV
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCommitResp'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------- Dedup / merge (tasket 20260601-110828-76e8) ----------
  /v1/dedup/contacts:
    get:
      tags: [contacts, dedup]
      summary: List contact duplicate candidates (exact email + fuzzy name)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DedupContactsResp'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dedup/contacts/merge:
    post:
      tags: [contacts, dedup]
      summary: Merge two contacts — re-points all linked records to the survivor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeContactReq'
      responses:
        '200':
          description: Merge result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/dedup/contacts/distinct:
    post:
      tags: [contacts, dedup]
      summary: Mark two contacts as distinct — suppress from future duplicate suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistinctReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  distinct: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dedup/companies:
    get:
      tags: [companies, dedup]
      summary: List company duplicate candidates (exact domain + fuzzy name)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DedupCompaniesResp'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/dedup/companies/merge:
    post:
      tags: [companies, dedup]
      summary: Merge two companies — re-points contacts, deals, notes, activities, tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeCompanyReq'
      responses:
        '200':
          description: Merge result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/dedup/companies/distinct:
    post:
      tags: [companies, dedup]
      summary: Mark two companies as distinct — suppress from future duplicate suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistinctReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  distinct: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---------- Pipeline ----------
  /v1/pipeline/stages:
    get:
      tags: [pipeline]
      summary: List pipeline stages (ordered)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PipelineStage' }

  # ---------- Activities (read-only) ----------
  /v1/contacts/{id}/activities:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [activities]
      summary: List activities on a contact
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/ActivityList' }
  /v1/companies/{id}/activities:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [activities]
      summary: List activities on a company
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/ActivityList' }
  /v1/deals/{id}/activities:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [activities]
      summary: List activities on a deal
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/ActivityList' }

  # ---------- Notes ----------
  /v1/contacts/{id}/notes:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [notes]
      summary: List notes on a contact
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/NoteList' }
    post:
      tags: [notes]
      summary: Create note on a contact
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
  /v1/companies/{id}/notes:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [notes]
      summary: List notes on a company
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/NoteList' }
    post:
      tags: [notes]
      summary: Create note on a company
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
  /v1/deals/{id}/notes:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [notes]
      summary: List notes on a deal
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200': { $ref: '#/components/responses/NoteList' }
    post:
      tags: [notes]
      summary: Create note on a deal
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
  /v1/notes/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      tags: [notes]
      summary: Update note
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }
    delete:
      tags: [notes]
      summary: Delete note
      responses:
        '204': { description: No Content }

  # ---------- Tasks ----------
  /v1/tasks:
    get:
      tags: [tasks]
      summary: List tasks
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [open, completed, all] }
      responses:
        '200': { $ref: '#/components/responses/TaskList' }
    post:
      tags: [tasks]
      summary: Create task
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
  /v1/tasks/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      tags: [tasks]
      summary: Update task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
    delete:
      tags: [tasks]
      summary: Delete task
      responses:
        '204': { description: No Content }
  /v1/tasks/{id}/complete:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    patch:
      tags: [tasks]
      summary: Toggle task completion
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                completed: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }

  # ---------- Workspace service tokens ----------
  /v1/workspace/tokens:
    get:
      tags: [workspace, tokens]
      summary: List workspace service tokens (hashes never returned)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ServiceToken' }
    post:
      tags: [workspace, tokens]
      summary: |
        Create a new service token. The plaintext token is returned
        ONCE in the response and is never persisted.
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceTokenCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceTokenCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/workspace/tokens/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    delete:
      tags: [workspace, tokens]
      summary: Revoke (delete) a service token
      responses:
        '204': { description: No Content }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: lecrm_session
      description: |
        Workspace-scoped HMAC-signed session cookie set by the OIDC
        callback. Cookie name is suffixed with the workspace slug.
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: lecrm_<workspace>_<random>
      description: |
        Workspace service token minted via POST /v1/workspace/tokens.
        Hashed with argon2id; only the plaintext returned at creation
        time can be presented as a Bearer credential.

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque base64url cursor from a previous `next_cursor`.
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 255 }
      description: |
        Opaque client-supplied token; replays within 24h return the
        cached response with `Idempotency-Replayed: true`.
    ExportFormat:
      name: format
      in: query
      required: false
      schema: { type: string, enum: [csv], default: csv }
      description: Export serialization. Only `csv` is supported at v0.
    ImportEntity:
      name: entity
      in: path
      required: true
      schema: { type: string, enum: [contacts, companies, deals] }
      description: |
        The CRM entity the CSV is imported into. An unknown value returns
        404 `unknown import entity`.

  responses:
    CsvExport:
      description: |
        CSV file download. `Content-Disposition` carries a dated filename
        (e.g. `contacts_2026-05-25.csv`). Custom properties are appended as
        `cf_`-prefixed columns.
      headers:
        Content-Disposition:
          schema: { type: string }
          description: attachment; filename="<entity>_<YYYY-MM-DD>.csv"
      content:
        text/csv:
          schema: { type: string, format: binary }
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict (e.g. stale stage transition)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ContactList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Contact' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }
    CompanyList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Company' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }
    DealList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Deal' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }
    ActivityList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Activity' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }
    NoteList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Note' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }
    TaskList:
      description: OK
      content:
        application/json:
          schema:
            type: object
            required: [data, has_more]
            properties:
              data:
                type: array
                items: { $ref: '#/components/schemas/Task' }
              next_cursor: { type: [string, 'null'] }
              has_more: { type: boolean }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    Contact:
      type: object
      required: [id, first_name, last_name, created_at, updated_at]
      properties:
        id:          { type: string, format: uuid }
        first_name:  { type: string }
        last_name:   { type: string }
        email:       { type: [string, 'null'], format: email }
        phone:       { type: [string, 'null'] }
        company_id:  { type: [string, 'null'], format: uuid }
        owner_id:    { type: [string, 'null'], format: uuid }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
    ContactCreate:
      type: object
      required: [first_name, last_name]
      properties:
        first_name: { type: string, minLength: 1 }
        last_name:  { type: string, minLength: 1 }
        email:      { type: string, format: email }
        phone:      { type: string }
        company_id: { type: string, format: uuid }
        owner_id:   { type: string, format: uuid }
    ContactUpdate:
      allOf: [ { $ref: '#/components/schemas/ContactCreate' } ]

    Company:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        domain:     { type: [string, 'null'] }
        industry:   { type: [string, 'null'] }
        size:       { type: [string, 'null'] }
        owner_id:   { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CompanyCreate:
      type: object
      required: [name]
      properties:
        name:     { type: string, minLength: 1 }
        domain:   { type: string }
        industry: { type: string }
        size:     { type: string }
        owner_id: { type: string, format: uuid }
    CompanyUpdate:
      allOf: [ { $ref: '#/components/schemas/CompanyCreate' } ]

    Deal:
      type: object
      required: [id, title, created_at, updated_at]
      properties:
        id:                   { type: string, format: uuid }
        title:                { type: string }
        amount:               { type: [number, 'null'] }
        currency:             { type: [string, 'null'] }
        stage_id:             { type: [string, 'null'], format: uuid }
        contact_id:           { type: [string, 'null'], format: uuid }
        company_id:           { type: [string, 'null'], format: uuid }
        owner_id:             { type: [string, 'null'], format: uuid }
        expected_close_date:  { type: [string, 'null'], format: date }
        closed_at:            { type: [string, 'null'], format: date-time }
        created_at:           { type: string, format: date-time }
        updated_at:           { type: string, format: date-time }
    DealCreate:
      type: object
      required: [title]
      properties:
        title:                { type: string, minLength: 1 }
        amount:               { type: number }
        currency:             { type: string }
        stage_id:             { type: string, format: uuid }
        contact_id:           { type: string, format: uuid }
        company_id:           { type: string, format: uuid }
        owner_id:             { type: string, format: uuid }
        expected_close_date:  { type: string, format: date }
    DealUpdate:
      allOf: [ { $ref: '#/components/schemas/DealCreate' } ]

    PipelineStage:
      type: object
      required: [id, name, position]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        position:     { type: integer }
        probability:  { type: [number, 'null'] }
        is_closed:    { type: boolean }
        is_won:       { type: boolean }

    Activity:
      type: object
      required: [id, entity_type, entity_id, event_type, payload, created_at]
      properties:
        id:            { type: string, format: uuid }
        entity_type:   { type: string, enum: [contact, company, deal] }
        entity_id:     { type: string, format: uuid }
        actor_type:    { type: [string, 'null'] }
        actor_id:      { type: [string, 'null'], format: uuid }
        event_type:    { type: string }
        source_system: { type: [string, 'null'] }
        payload:       { type: object }
        created_at:    { type: string, format: date-time }

    Note:
      type: object
      required: [id, entity_type, entity_id, body, created_at, updated_at]
      properties:
        id:          { type: string, format: uuid }
        entity_type: { type: string, enum: [contact, company, deal] }
        entity_id:   { type: string, format: uuid }
        body:        { type: string }
        author_id:   { type: [string, 'null'], format: uuid }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
    NoteCreate:
      type: object
      required: [body]
      properties:
        body:      { type: string, minLength: 1 }
        author_id: { type: string, format: uuid }
    NoteUpdate:
      allOf: [ { $ref: '#/components/schemas/NoteCreate' } ]

    Task:
      type: object
      required: [id, title, completed, created_at, updated_at]
      properties:
        id:          { type: string, format: uuid }
        title:       { type: string }
        description: { type: [string, 'null'] }
        due_at:      { type: [string, 'null'], format: date-time }
        completed:   { type: boolean }
        completed_at: { type: [string, 'null'], format: date-time }
        assignee_id: { type: [string, 'null'], format: uuid }
        entity_type: { type: [string, 'null'], enum: [contact, company, deal, null] }
        entity_id:   { type: [string, 'null'], format: uuid }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
    TaskCreate:
      type: object
      required: [title]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        due_at:      { type: string, format: date-time }
        assignee_id: { type: string, format: uuid }
        entity_type: { type: string, enum: [contact, company, deal] }
        entity_id:   { type: string, format: uuid }
    TaskUpdate:
      allOf: [ { $ref: '#/components/schemas/TaskCreate' } ]

    ServiceToken:
      type: object
      required: [id, name, actor_type, scopes, created_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        actor_type:   { type: string, enum: [human_api, mcp_agent, internal_service, connector] }
        scopes:       { type: array, items: { type: string } }
        expires_at:   { type: [string, 'null'], format: date-time }
        last_used_at: { type: [string, 'null'], format: date-time }
        created_at:   { type: string, format: date-time }
    ServiceTokenCreate:
      type: object
      required: [name, actor_type]
      properties:
        name:       { type: string, minLength: 1, maxLength: 200 }
        actor_type: { type: string, enum: [human_api, mcp_agent, internal_service, connector] }
        scopes:     { type: array, items: { type: string }, default: ["*"] }
        expires_at: { type: string, format: date-time }
    ServiceTokenCreated:
      type: object
      required: [token, service_token]
      description: |
        The plaintext `token` is returned ONCE — store it now; the
        server only persists the argon2id hash.
      properties:
        token:         { type: string, description: "Plaintext, format: lecrm_<workspace>_<random>" }
        service_token: { $ref: '#/components/schemas/ServiceToken' }

    # --- CSV import schemas ---
    ImportAnalyzeReq:
      type: object
      required: [csv]
      properties:
        csv: { type: string, description: UTF-8 CSV text }

    ImportMappingReq:
      type: object
      required: [csv, mapping]
      properties:
        csv:     { type: string }
        mapping: { type: object, additionalProperties: { type: string } }
        dedupe:  { type: string, enum: [update, skip, create], default: update }

    ImportAnalyzeResp:
      type: object
      properties:
        columns:           { type: array, items: { type: string } }
        sample_rows:       { type: array, items: { type: array, items: { type: string } } }
        row_count:         { type: integer }
        core_fields:       { type: array, items: { type: object } }
        custom_fields:     { type: array, items: { type: object } }
        suggested_mapping: { type: object, additionalProperties: { type: string } }

    ImportPreviewResp:
      type: object
      properties:
        summary: { $ref: '#/components/schemas/ImportSummary' }
        rows:    { type: array, items: { $ref: '#/components/schemas/ImportRowOutcome' } }

    ImportCommitResp:
      type: object
      properties:
        summary:          { $ref: '#/components/schemas/ImportSummary' }
        error_report_csv: { type: string }
        audit_event:      { type: string }

    ImportSummary:
      type: object
      properties:
        total:  { type: integer }
        create: { type: integer }
        update: { type: integer }
        skip:   { type: integer }
        error:  { type: integer }

    ImportRowOutcome:
      type: object
      properties:
        line:   { type: integer }
        action: { type: string, enum: [create, update, skip, error] }
        reason: { type: string }
        label:  { type: string }

    DedupContactRecord:
      type: object
      required: [id, first_name, last_name, created_at]
      properties:
        id:         { type: string, format: uuid }
        first_name: { type: string }
        last_name:  { type: string }
        email:      { type: string, nullable: true }
        phone:      { type: string, nullable: true }
        company_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    DedupCompanyRecord:
      type: object
      required: [id, name, created_at]
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        domain:     { type: string, nullable: true }
        industry:   { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    DedupContactPair:
      type: object
      required: [a, b, reason, score]
      properties:
        a:      { $ref: '#/components/schemas/DedupContactRecord' }
        b:      { $ref: '#/components/schemas/DedupContactRecord' }
        reason: { type: string, enum: [exact_email, similar_name] }
        score:  { type: number, format: float }

    DedupCompanyPair:
      type: object
      required: [a, b, reason, score]
      properties:
        a:      { $ref: '#/components/schemas/DedupCompanyRecord' }
        b:      { $ref: '#/components/schemas/DedupCompanyRecord' }
        reason: { type: string, enum: [exact_domain, similar_name] }
        score:  { type: number, format: float }

    DedupContactsResp:
      type: object
      required: [pairs]
      properties:
        pairs:
          type: array
          items: { $ref: '#/components/schemas/DedupContactPair' }

    DedupCompaniesResp:
      type: object
      required: [pairs]
      properties:
        pairs:
          type: array
          items: { $ref: '#/components/schemas/DedupCompanyPair' }

    MergeContactReq:
      type: object
      required: [survivor_id, loser_id]
      properties:
        survivor_id: { type: string, format: uuid }
        loser_id:    { type: string, format: uuid }
        fields:
          type: object
          additionalProperties:
            type: string
            enum: [survivor, loser]

    MergeCompanyReq:
      type: object
      required: [survivor_id, loser_id]
      properties:
        survivor_id: { type: string, format: uuid }
        loser_id:    { type: string, format: uuid }
        fields:
          type: object
          additionalProperties:
            type: string
            enum: [survivor, loser]

    MergeResult:
      type: object
      required: [survivor_id, loser_id, merged]
      properties:
        survivor_id: { type: string, format: uuid }
        loser_id:    { type: string, format: uuid }
        merged:      { type: boolean }

    DistinctReq:
      type: object
      required: [id_a, id_b]
      properties:
        id_a: { type: string, format: uuid }
        id_b: { type: string, format: uuid }

security:
  - sessionCookie: []
  - bearerToken: []
