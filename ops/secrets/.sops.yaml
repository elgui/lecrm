# ops/secrets/.sops.yaml — SOPS creation rules for leCRM v0.
#
# Per ADR-007 §2 (sops + age is the v0 secrets baseline; Vault is v1+).
# This file governs how `sops` encrypts new manifests created under:
#
#   secrets/clients/<slug>/secrets.enc.yaml — per-tenant runtime secrets
#   secrets/operator/secrets.enc.yaml       — operator-level Tier-0 secrets
#   deploy/.env.<slug>.enc                  — rendered Compose env files
#
# Invoke sops from the repository root so the path_regex anchors match.
#
# Recipients
# ----------
# Single v0 recipient: Guillaume's age public key. Generated by
# `ops/secrets/bootstrap.sh`, stored as the primary copy on a YubiKey
# (per ADR-007 §2) with a Bitwarden vault backup. A second recipient (CI
# deploy key for GitHub Actions release-time decryption) is planned for
# v0.5; tracked as TO RESOLVE-1 in ops/runbooks/secret-rotation.md.
#
# The `age:` key below is intentionally a placeholder
# (REPLACE_WITH_AGE_PUBLIC_KEY). The bootstrap script patches it with
# the literal age recipient line on first key generation. Until that
# happens, every `sops --encrypt …` call against these paths will fail
# fast — which is the desired property: nothing encrypted under a missing
# key.

creation_rules:
  # Staging Compose env (lecrm.gbconsult.me) — see deploy/README.md
  # "Staging" section. Encrypted to a DEDICATED, DISPOSABLE staging age
  # key held ONLY on the OVH box 51.77.146.49 — NOT the operator key
  # (which stays on Guillaume's workstation/YubiKey, per ADR-007 §2).
  # Lowest blast radius for an internet-exposed stopgap host; the key is
  # revoked/discarded at the Hetzner migration (tasket order:5,
  # 2026-06-12). Intentionally first (SOPS first-match wins) so the
  # staging file never inherits the operator placeholder below.
  # NB: anchored on a "/" boundary, not "^", because sops 3.13.1 matches
  # path_regex against the ABSOLUTE path. The "^secrets/" / "^deploy/"
  # rules below were written for older sops (relative-path match) and
  # will NOT match under 3.13.1 — flagged for the secrets-baseline tasket.
  - path_regex: (^|/)deploy/\.env\.staging\.enc$
    age: age1q5y3z9t0d9gmw069eweq2t4qmtpm82lu72d7tcf87ed2gsscus2stwzf68

  # Staging Gmail OAuth refresh-token manifests (ADR-004 rev 2 §4). Encrypted to
  # the SAME disposable staging age key as the staging compose env above (held
  # ONLY on the staging box, never the operator key) so the box can
  # decrypt-at-deploy without the operator key ever touching this
  # internet-exposed host. The `staging/` path segment routes these here BEFORE
  # the operator-keyed general gmail rule below (SOPS first-match wins);
  # production grants use the 2-segment path + operator key. Three path segments
  # after `gmail/` (staging/<workspace_id>/<user_id>) so the 2-segment general
  # rule does NOT also match. Setup: ops/runbooks/gmail-oauth-pubsub-setup.md.
  - path_regex: (^|/)secrets/oauth/gmail/staging/[^/]+/[^/]+\.enc\.yaml$
    age: age1q5y3z9t0d9gmw069eweq2t4qmtpm82lu72d7tcf87ed2gsscus2stwzf68
    encrypted_regex: '^(.*)$'

  # Per-tenant runtime-secret manifest. One file per workspace slug.
  - path_regex: ^secrets/clients/[^/]+/secrets\.enc\.yaml$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
    encrypted_regex: '^(.*)$'

  # Operator-level secrets — Tier-0, not workspace-scoped.
  - path_regex: ^secrets/operator/.*\.enc\.yaml$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
    encrypted_regex: '^(.*)$'

  # Per-workspace-user Gmail OAuth refresh-token manifest (ADR-004 rev2 §4,
  # tasket 20260614-154815-5078). One file per (workspace_id, user_id).
  # Encrypted to the operator key — same recipient as the per-tenant
  # manifests above. Anchored with `(^|/)` (not `^`) so it matches under
  # sops 3.13.1's absolute-path matching — see the staging-rule note above;
  # the older `^secrets/...` siblings are flagged there as non-matching on
  # 3.13.1. Setup: ops/runbooks/gmail-oauth-pubsub-setup.md.
  - path_regex: (^|/)secrets/oauth/gmail/[^/]+/[^/]+\.enc\.yaml$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
    encrypted_regex: '^(.*)$'

  # Rendered Compose env files. Optional: deploy hosts may keep these
  # encrypted on disk and decrypt to a tmpfs at boot time. v0 default
  # renders to plaintext on the deploy host (mode 0600, gitignored).
  - path_regex: ^deploy/\.env\.[^/]+\.enc$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
