# ops/secrets/.sops.yaml — SOPS creation rules for leCRM v0.
#
# Per ADR-007 §2 (sops + age is the v0 secrets baseline; Vault is v1+).
# This file governs how `sops` encrypts new manifests created under:
#
#   secrets/clients/<slug>/secrets.enc.yaml — per-tenant runtime secrets
#   secrets/operator/secrets.enc.yaml       — operator-level Tier-0 secrets
#   deploy/.env.<slug>.enc                  — rendered Compose env files
#
# Invoke sops from the repository root so the path_regex anchors match.
#
# Recipients
# ----------
# Single v0 recipient: Guillaume's age public key. Generated by
# `ops/secrets/bootstrap.sh`, stored as the primary copy on a YubiKey
# (per ADR-007 §2) with a Bitwarden vault backup. A second recipient (CI
# deploy key for GitHub Actions release-time decryption) is planned for
# v0.5; tracked as TO RESOLVE-1 in ops/runbooks/secret-rotation.md.
#
# The `age:` key below is intentionally a placeholder
# (REPLACE_WITH_AGE_PUBLIC_KEY). The bootstrap script patches it with
# the literal age recipient line on first key generation. Until that
# happens, every `sops --encrypt …` call against these paths will fail
# fast — which is the desired property: nothing encrypted under a missing
# key.

creation_rules:
  # Per-tenant runtime-secret manifest. One file per workspace slug.
  - path_regex: ^secrets/clients/[^/]+/secrets\.enc\.yaml$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
    encrypted_regex: '^(.*)$'

  # Operator-level secrets — Tier-0, not workspace-scoped.
  - path_regex: ^secrets/operator/.*\.enc\.yaml$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
    encrypted_regex: '^(.*)$'

  # Rendered Compose env files. Optional: deploy hosts may keep these
  # encrypted on disk and decrypt to a tmpfs at boot time. v0 default
  # renders to plaintext on the deploy host (mode 0600, gitignored).
  - path_regex: ^deploy/\.env\.[^/]+\.enc$
    age: REPLACE_WITH_AGE_PUBLIC_KEY
