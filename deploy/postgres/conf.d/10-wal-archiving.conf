# WAL archiving + restore configuration for leCRM Phase 1.
#
# Loaded via include_dir = conf.d/ (set by initdb hook).
# References:
#   - ADR-006 §1 (WAL-G + archive_timeout=60 for ~60s RPO)
#   - ADR-009 §2.5 (WAL-G canonical)
#
# All wal-g invocations are wrapped in /usr/local/bin/lecrm/wal-push.sh
# so we get a single chokepoint for logging, exit-status handling, and
# environment loading from /etc/postgres/walg.env (mounted by Compose).

wal_level                = replica
archive_mode             = on
archive_command          = '/usr/local/bin/lecrm/wal-push.sh %p %f'
archive_timeout          = 60
restore_command          = '/usr/local/bin/lecrm/wal-fetch.sh %f %p'

# Streaming-replica retention is left at defaults for v0 (no replica).
# Phase 3 (Patroni) revisits this.
max_wal_senders          = 0
wal_keep_size            = 1GB

# Conservative checkpoint pacing — base-backup runs once per week and we
# value steady WAL throughput over checkpoint compaction.
checkpoint_timeout       = 15min
checkpoint_completion_target = 0.9

# Logging that the WAL-G systemd timer / cron will scrape.
log_line_prefix          = '%m [%p] %q%u@%d '
log_min_messages         = warning
