# nginx stream SNI passthrough for the leCRM staging edge (Option B).
# ---------------------------------------------------------------------------
# STATUS: STAGED, NOT APPLIED. This rewires the shared host's public :443
# and will briefly affect the co-located apps (tele-claude, aaraume,
# conversation, drawlk). Apply only via the runbook in deploy/nginx/README.md
# with an explicit go-ahead and a tested rollback.
# ---------------------------------------------------------------------------
#
# Why a stream front: the host nginx already terminates TLS for several
# *.gbconsult.me vhosts on 0.0.0.0:443, and Caddy must own the
# *.lecrm.gbconsult.me wildcard (DNS-01) and terminate its own TLS. Two
# processes cannot both bind :443, so nginx becomes a thin layer-4 SNI
# router: it peeks at the TLS SNI (ssl_preread, no decryption) and forwards
# the raw connection either to Caddy or back to nginx's own TLS vhosts.
#
# Placement: this is a top-level `stream {}` block and MUST be included
# OUTSIDE the http{} block. Debian's nginx.conf includes conf.d and
# sites-enabled INSIDE http{}, so this file is included from nginx.conf's
# top level (see runbook), NOT dropped into conf.d/.

stream {
    # Route by the SNI server name the client requested.
    map $ssl_preread_server_name $lecrm_edge_upstream {
        # Every *.lecrm.gbconsult.me subdomain -> Caddy (terminates TLS,
        # owns the DNS-01 wildcard).
        ~^[^.]+\.lecrm\.gbconsult\.me$   127.0.0.1:8443;
        # Everything else -> nginx's own TLS vhosts, relocated off the
        # public :443 to an internal port (see runbook step 2).
        default                          127.0.0.1:8444;
    }

    log_format lecrm_stream '$remote_addr [$time_local] '
                            'sni="$ssl_preread_server_name" '
                            '-> $lecrm_edge_upstream '
                            '$protocol $status $bytes_sent $bytes_received '
                            '$session_time';
    access_log /var/log/nginx/lecrm-stream.log lecrm_stream;

    server {
        listen 443 reuseport;
        listen [::]:443 reuseport;
        ssl_preread on;                 # read SNI without decrypting
        proxy_pass $lecrm_edge_upstream;
        proxy_timeout 300s;
        # NOTE: client source IP is not preserved to the backends through
        # a plain stream proxy. Acceptable for staging. If a backend needs
        # the real IP, switch to PROXY protocol (proxy_protocol on; here +
        # the matching listen ... proxy_protocol; on every backend).
    }
}
