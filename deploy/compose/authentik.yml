# Authentik 2025.10 — v0 IDP per ADR-009 §7.1.
#
# Decision recorded in commit 63be520: Authentik chosen over Zitadel
# Cloud EU for v0. The (issuer, sub) user-key tuple per ADR-009 §7.1
# keeps the v0→v1 IDP migration a mapping table, not a destructive
# rewrite.
#
# Authentik 2025.10 removed the hard Redis dependency; Postgres-backed
# caching is the default. This Compose file therefore omits Redis.
#
# Authentik has its OWN Postgres in this file (`authentik-postgres`) —
# separate from the leCRM control-plane Postgres in postgres.yml. Both
# can run on the same host; in production they live on the same cluster
# but in distinct databases.

services:
  authentik-postgres:
    image: postgres:17-alpine
    container_name: lecrm-authentik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: authentik
    volumes:
      - authentik_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lecrm

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: lecrm-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?required}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?required}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:?required}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:?required}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:?required}
      # 2025.10 cache backend = postgres; no Redis URL needed.
      AUTHENTIK_CACHE__URL: ""
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9443:9443"
    networks:
      - lecrm
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-worker:
        condition: service_started

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.10
    container_name: lecrm-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?required}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?required}
      AUTHENTIK_CACHE__URL: ""
    networks:
      - lecrm
    depends_on:
      authentik-postgres:
        condition: service_healthy

volumes:
  authentik_db:

networks:
  lecrm:
    name: lecrm
    external: true
