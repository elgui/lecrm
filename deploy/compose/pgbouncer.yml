# PgBouncer 1.22 — connection pooler for multi-tenant scale.
#
# Sits between the API (pgx v5) and PostgreSQL 17:
#   API (pgx, SimpleProtocol) → PgBouncer :6432 (transaction mode) → PostgreSQL :5432
#
# Deploy alongside postgres.yml:
#   docker compose -f deploy/compose/postgres.yml -f deploy/compose/pgbouncer.yml up
#
# Not required at ≤5 tenants — the API's TenantPool handles connection
# bounding in Go. PgBouncer adds an additional multiplexing layer for
# 10+ tenants where per-workspace Postgres roles would otherwise exhaust
# max_connections (~150 on a 12GB VPS).
#
# Key settings:
#   pool_mode = transaction — conn returned to pool after each transaction
#   server_reset_query = DEALLOCATE ALL — clears prepared statements between txns
#   The API uses pgx QueryExecModeSimpleProtocol so no prepared statements
#   are created; DEALLOCATE ALL is belt-and-suspenders.

services:
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0   # edoburu tags carry a -pN patch suffix; 1.22.0 (no suffix) does not exist
    container_name: lecrm-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${LECRM_PGBOUNCER_AUTH_USER:-lecrm_api}:${LECRM_PGBOUNCER_AUTH_PASS:?required}@postgres:5432/lecrm"
      POOL_MODE: transaction
      SERVER_RESET_QUERY: "DEALLOCATE ALL"
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      MAX_DB_CONNECTIONS: "50"
      LOG_CONNECTIONS: "1"
      LOG_DISCONNECTIONS: "1"
      STATS_PERIOD: "60"
      AUTH_TYPE: "md5"
    ports:
      - "127.0.0.1:${LECRM_PGBOUNCER_HOST_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "printf '' >/dev/tcp/127.0.0.1/6432 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lecrm

networks:
  lecrm:
    name: lecrm
    external: true
