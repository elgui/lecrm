# LGTM observability stack — Loki + Grafana + Tempo + Prometheus + OTel
# Collector. Memory budget ~1.1 GB.
#
# STATUS: DEFERRED. Council review (2026-05-24) decided self-hosted LGTM
# is premature at v0 (<5 clients). v0 observability = structured slog
# JSON to stdout + Grafana Cloud free tier. See ops/observability.md.
#
# This file is kept for OPTIONAL local deep-debugging only. Do NOT
# include it in the default compose profile or production deployment.
#
# Reactivate at v1 (>20 workspaces) or when Grafana Cloud free tier
# limits are exceeded.
#
# All metrics MUST be labelled with `workspace_id` (ADR-009 §7.3) for
# per-tenant anomaly detection when reactivated.

services:
  grafana:
    image: grafana/grafana:11.4.0
    container_name: lecrm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - lecrm

  loki:
    image: grafana/loki:3.3.2
    container_name: lecrm-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - lecrm

  tempo:
    image: grafana/tempo:2.6.1
    container_name: lecrm-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
    networks:
      - lecrm

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: lecrm-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - prometheus_data:/prometheus
    networks:
      - lecrm

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: lecrm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    networks:
      - lecrm
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:

networks:
  lecrm:
    name: lecrm
    external: true
