version: "2"

run:
  timeout: 5m
  build-tags:
    - e2e
    - integration

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - misspell
    - revive
    - unconvert
    - nolintlint

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    revive:
      severity: warning
      rules:
        - name: package-comments
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    rules:
      - path: internal/sqlcgen/
        linters:
          - revive
          - staticcheck
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
