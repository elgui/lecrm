name: ci

# CI scaffold per ADR-009 §10 and tasket b844 (Part B checklist).
# Every PR touching apps/, packages/, or deploy/ runs the full quality
# gate. `main` pushes run the same gates plus the multi-stage Docker
# build to confirm release artefacts compile.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------- Go API
  go:
    name: go-test+lint+sec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify (apps/api)
        working-directory: apps/api
        run: go mod verify

      - name: go test ./... (apps/api)
        working-directory: apps/api
        # testcontainers-go boots Postgres on demand for the OIDC + DB
        # integration tests. Docker is available on GitHub-hosted runners.
        run: go test -race -count=1 -timeout 5m ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: apps/api
          args: --timeout=5m

      - name: gosec
        uses: securego/gosec@v2.26.1
        with:
          args: ./apps/api/...

      - name: govulncheck
        # Advisory, NOT a merge blocker. govulncheck exits non-zero on any
        # called vulnerability — including Go *stdlib* CVEs whose only fix is
        # a toolchain bump that may not be released/cached yet (e.g.
        # GO-2026-5039 / GO-2026-5037, fixed only in go1.25.11). Those are
        # not actionable by a PR author, so gating every merge on them walls
        # off the queue for reasons unrelated to the change. The report stays
        # visible here; bump GO_VERSION when the patched toolchain lands.
        # go test / golangci-lint / gosec above remain hard blockers.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd apps/api && govulncheck ./...

  # ---------------------------------------------- Go API integration suite
  go-integration:
    name: go-integration-docker
    runs-on: ubuntu-latest
    # Separate from the `go` job so untagged unit feedback stays fast. This
    # job runs the Docker-backed `//go:build integration` suite — the only
    # gate that exercises features end-to-end against a real Postgres.
    # A green untagged build is NOT evidence a feature works: the
    # connector-audit prod bug (core.audit_log rejecting actor_type
    # 'connector') and the CSV-import 404 both passed the unit suite while
    # broken (run report e35442, rec #3).
    #
    # Postgres is booted by testcontainers-go (tcpostgres.Run), which binds
    # to an ephemeral port on 127.0.0.1 — never `-p 5432:5432`. ubuntu-latest
    # ships a working Docker daemon, so SkipIfProviderIsNotHealthy does NOT
    # skip here; the tests actually run.
    #
    # Balance — solid gate without taxing fast iteration:
    #   * On PRs the heavy suite runs ONLY when apps/api/** or DB migrations
    #     changed (the `changes` guard below). Web-only / docs PRs hit the
    #     fast path and finish in seconds.
    #   * The job ALWAYS reports the `go-integration-docker` check (green on
    #     the fast path), so it is safe to mark as a REQUIRED status check —
    #     a path-filtered-out *job* would otherwise hang a required check
    #     forever as "expected/pending".
    #   * On push to main it always runs full, as a post-merge safety net.
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the PR base to diff changed paths (shallow clone has none).
          fetch-depth: 0

      - name: Detect API / migration changes (PR fast-path guard)
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "push event — running full integration suite."
            exit 0
          fi
          base="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "${base}...HEAD" \
               | grep -Eq '^(apps/api/|packages/db/migrations/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "apps/api or migration changes detected — running integration suite."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No apps/api or migration changes — integration suite skipped (fast path)."
          fi

      - name: Set up Go
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify (apps/api)
        if: steps.changes.outputs.run == 'true'
        working-directory: apps/api
        run: go mod verify

      - name: go test -tags integration ./internal/... (apps/api)
        if: steps.changes.outputs.run == 'true'
        working-directory: apps/api
        # -p 1 serializes packages so we never run many Postgres containers
        # concurrently on a 2-core runner (each integration test boots its
        # own container and terminates it on cleanup). 20m timeout covers
        # cold image pulls + per-test container startup across the suite.
        run: go test -race -count=1 -p 1 -tags integration -timeout 20m ./internal/...

  # ---------------------------------------------------- Go admin (Story 8.1)
  build-admin:
    name: build-admin
    runs-on: ubuntu-latest
    # Story 8.1 / D8 — service-container Postgres 16 (NOT testcontainers).
    # The migration self-bootstraps the lecrm_provisioner role on top of
    # the postgres superuser (0001_init.sql:36-43); apps/admin tests
    # connect as that superuser.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LECRM_PROVISIONER_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify (apps/admin)
        working-directory: apps/admin
        run: go mod verify

      - name: Apply DB migrations via lecrm-migrate (custom, NOT goose)
        working-directory: apps/migrate
        run: |
          go run ./cmd/lecrm-migrate apply \
            --migrations-dir ../../packages/db/migrations

      - name: go test ./... (apps/admin)
        working-directory: apps/admin
        # Integration tests are guarded by //go:build integration and run
        # only when LECRM_PROVISIONER_DSN is set (above).
        #
        # -p 1 serializes package execution: internal/tenant and
        # internal/config both run provisioning DDL (CREATE ROLE, schema
        # creation via core.lecrm_provision_workspace_with_registry)
        # against the SINGLE shared postgres service container. Without
        # serialization their parallel provisions race on shared
        # role/catalog tuples → "tuple concurrently updated" (XX000).
        run: go test -race -count=1 -p 1 -timeout 5m -tags=integration ./...

      - name: golangci-lint (apps/admin)
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: apps/admin
          args: --timeout=5m

      - name: Smoke — lecrm-admin tenant create + verify
        working-directory: apps/admin
        # Smoke happens AFTER the unit/integration suite proves the binary
        # behaves under test. Smoke uses the same DSN, provisions a
        # throw-away tenant, verifies all in-scope invariants, and tears
        # down via raw SQL (tenant delete subcommand is out of scope per
        # Story 8.1).
        run: |
          SLUG="ci-smoke-${GITHUB_RUN_ID}"
          OUT=$(go run ./cmd/lecrm-admin tenant create \
            --slug "$SLUG" --admin-email ci@example.com)
          echo "$OUT"
          WORKSPACE_ID=$(echo "$OUT" | sed -n 's/^WORKSPACE_ID=\(.*\)$/\1/p' | head -n 1)
          if [ -z "$WORKSPACE_ID" ]; then
            echo "smoke: failed to capture WORKSPACE_ID"; exit 1
          fi
          go run ./cmd/lecrm-admin tenant verify --slug "$SLUG"
          UUID_NOHYPHENS=$(echo "$WORKSPACE_ID" | tr -d '-')
          psql "$LECRM_PROVISIONER_DSN" -v ON_ERROR_STOP=1 <<SQL
          DROP SCHEMA IF EXISTS workspace_${UUID_NOHYPHENS} CASCADE;
          DROP SCHEMA IF EXISTS river_${UUID_NOHYPHENS} CASCADE;
          DELETE FROM core.audit_log WHERE workspace_id = '${WORKSPACE_ID}';
          DELETE FROM core.workspaces WHERE slug = '${SLUG}';
          DROP ROLE IF EXISTS workspace_${UUID_NOHYPHENS};
          SQL
          echo PASS

  # ----------------------------------------------------------- Atlas + DB
  atlas:
    name: atlas-migrate-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Atlas migrate lint diffs new files against the base ref;
          # the default shallow clone has no base.
          fetch-depth: 0

      # Pin to Atlas v0.37 — v0.38+ moved `atlas migrate lint` behind
      # the Atlas Pro tier (https://atlasgo.io/blog-v038#change-in-v038-atlas-migrate-lint).
      # v0.37 is the last release where lint runs unauthenticated.
      - name: Install Atlas CLI
        uses: ariga/setup-atlas@v0
        with:
          version: v0.37.0

      # Direct CLI invocation rather than the ariga/atlas-action wrapper:
      # the wrapper's newer versions require `dir-name` (an Atlas Cloud
      # project slug) and we don't use Atlas Cloud. `--latest 1` lints
      # only the most recently added migration file — typical PR-gate
      # behavior without needing a base-ref diff.
      - name: Atlas migrate lint
        run: |
          atlas migrate lint \
            --dir file://packages/db/migrations \
            --dev-url 'docker://postgres/17/dev?search_path=public' \
            --latest 1

  # --------------------------------------------------------------- Web SPA
  web:
    name: web-test+typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: pnpm install
        # --frozen-lockfile=false so the first CI run (before a
        # pnpm-lock.yaml is committed) still passes. Once the lockfile
        # lands, the flag becomes harmless.
        run: pnpm install --frozen-lockfile=false

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

  # ------------------------------------------------------- Docker release
  docker:
    name: docker-multistage-build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage image (Vite → Go → distroless)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: lecrm-api:ci
          # Only build, do not push from CI. Promotion lives in the
          # deploy workflow (Sprint 1 final commit per ADR-009 §10).

  # ---------------------------------------------------- Admin image (8.1)
  docker-admin:
    name: docker-admin-build
    runs-on: ubuntu-latest
    needs: [build-admin]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build lecrm-admin image (distroless, Story 8.1 AC-D5)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: lecrm-admin:ci
          # Build-only here. Dokku push on main merges happens via a
          # separate deploy workflow once Guillaume has provisioned the
          # lecrm-admin Dokku app on 54.37.157.49 (see
          # docs/integrator-handoff.md "Production Dokku deployment").
