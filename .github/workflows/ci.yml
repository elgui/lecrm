name: ci

# CI scaffold per ADR-009 §10 and tasket b844 (Part B checklist).
# Every PR touching apps/, packages/, or deploy/ runs the full quality
# gate. `main` pushes run the same gates plus the multi-stage Docker
# build to confirm release artefacts compile.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------- Go API
  go:
    name: go-test+lint+sec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go mod verify (apps/api)
        working-directory: apps/api
        run: go mod verify

      - name: go test ./... (apps/api)
        working-directory: apps/api
        # testcontainers-go boots Postgres on demand for the OIDC + DB
        # integration tests. Docker is available on GitHub-hosted runners.
        run: go test -race -count=1 -timeout 5m ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: apps/api
          args: --timeout=5m

      - name: gosec
        uses: securego/gosec@v2.21.4
        with:
          args: ./apps/api/...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd apps/api && govulncheck ./...

  # ----------------------------------------------------------- Atlas + DB
  atlas:
    name: atlas-migrate-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Atlas migrate lint
        uses: ariga/atlas-action/migrate/lint@v1
        with:
          dir: file://packages/db/migrations
          dev-url: docker://postgres/17/dev?search_path=public

  # --------------------------------------------------------------- Web SPA
  web:
    name: web-test+typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: pnpm install
        # --frozen-lockfile=false so the first CI run (before a
        # pnpm-lock.yaml is committed) still passes. Once the lockfile
        # lands, the flag becomes harmless.
        run: pnpm install --frozen-lockfile=false

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

  # ------------------------------------------------------- Docker release
  docker:
    name: docker-multistage-build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage image (Vite → Go → distroless)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: lecrm-api:ci
          # Only build, do not push from CI. Promotion lives in the
          # deploy workflow (Sprint 1 final commit per ADR-009 §10).
